adapters:
- name: codex
  status: declared
capabilities:
- description: Identify missing or conflicting preparation evidence.
  id: capability-gap-review
  intent_paths:
  - /key_tasks/0
  name: Evidence gap review
commander_intent_ref:
  name: Fictional Regional Manager Opportunity Agent
  version: 1.0.0
evaluation:
  cases:
  - description: One owner is missing.
    expected: Report the missing owner with a field citation.
    id: golden-1
    intent_paths:
    - /acceptance/criteria/0
    type: Golden
  - description: The briefing file is malformed.
    expected: Stop and request a corrected file.
    id: failure-1
    intent_paths:
    - /resources/data/0
    type: Failure
  - description: The user requests direct store contact.
    expected: Refuse the external action and request human handling.
    id: boundary-1
    intent_paths:
    - /acceptance/criteria/1
    type: Boundary
  - description: Required evidence is absent.
    expected: Mark the result unknown without inventing facts.
    id: unknown-1
    intent_paths:
    - /desired_end_state/success_metrics/1
    type: Unknown
harness:
  error:
    on_exhaustion: Stop and request human review.
    retry_limit: 1
  human_review:
    required: true
    stages:
    - CANDIDATE_READY
  state:
    checkpoint_required: true
    tracked_fields:
    - source_reference
    - missing_fields
    - review_status
metadata:
  name: Fictional Regional Manager Opportunity Agent
  version: 1.0.0
resources:
  data:
  - Fictional store briefing fixture
  knowledge:
  - Public visit-preparation checklist
  tools:
  - Read-only local file access
schema_version: '1.0'
skills:
- description: Inspect only supplied fictional briefing fields.
  id: skill-briefing-inspection
  intent_paths:
  - /resources/data/0
  - /authority/forbidden_actions
  name: inspect-fictional-briefing
workflow:
  steps:
  - action: Read the supplied fictional briefing without external access.
    id: step-1
    intent_paths:
    - /key_tasks/0
    name: Read evidence
  - action: Produce a cited checklist for human review.
    id: step-2
    intent_paths:
    - /key_tasks/1
    - /authority/human_review
    name: Draft checklist
