schema_version: "1.0"
modes:
  CREATE:
    terminal_states: [DELIVERED, CANCELLED]
    transitions:
      NEW: [DISCOVERY]
      DISCOVERY: [INTERVIEWING]
      INTERVIEWING: [INTENT_CONFIRMATION]
      INTENT_CONFIRMATION: [READY, INTERVIEWING]
      READY: [BLUEPRINTING]
      BLUEPRINTING: [PRODUCING]
      PRODUCING: [VALIDATING]
      VALIDATING: [CANDIDATE_READY]
      CANDIDATE_READY: [DELIVERED]
  REVIEW:
    terminal_states: [REVIEW_READY, CANCELLED]
    transitions:
      NEW: [REVIEW_INTAKE]
      REVIEW_INTAKE: [REVIEWING]
      REVIEWING: [REVIEW_READY]
  OPTIMIZE:
    terminal_states: [CANDIDATE_READY, CANCELLED]
    transitions:
      NEW: [REVIEW_INTAKE]
      REVIEW_INTAKE: [REVIEWING]
      REVIEWING: [REVIEW_READY]
      REVIEW_READY: [OPTIMIZATION_PROPOSED]
      OPTIMIZATION_PROPOSED: [OPTIMIZATION_APPROVED]
      OPTIMIZATION_APPROVED: [OPTIMIZING]
      OPTIMIZING: [VALIDATING]
      VALIDATING: [CANDIDATE_READY]
